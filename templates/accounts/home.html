{% extends "base.html" %}
{% block title %}Home{% endblock %}
{% block content %}
  <h1>Logged in</h1>
  <p>{{ user.email }} &mdash; {{ user.congregation.name }}</p>
  <form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit">Log out</button>
  </form>
{% endblock %}

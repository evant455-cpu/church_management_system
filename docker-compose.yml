services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: church_management_system
      POSTGRES_USER: church_dev
      POSTGRES_PASSWORD: church_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U church_dev -d church_management_system"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
